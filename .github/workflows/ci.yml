name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build web (生成 dist，worker 测试与 wrangler 需要)
        run: pnpm build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test (core + ai + worker + web)
        run: pnpm -r test

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build

      - name: Install Playwright chromium
        run: pnpm -F @sengoku/web exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm -F @sengoku/web e2e
        env:
          CI: '1'
